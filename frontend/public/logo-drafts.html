<h1>Funature Logo — 纸风车 × 四芒星负空间</h1>
<h2>四片叶片顺时针旋转，中间负空间自然形成四芒星</h2>

<!--
  构造逻辑：
  4 片叶片以中心 (512,512) 为轴，每片是一个 "弯月" 形扇区。
  叶片之间留出尖锐间隙，4 条间隙交汇形成四芒星。

  每片叶片 = 从中心偏移处出发，走外弧到远端尖角，再内弧回来。
  旋转 90° 复制 4 份。
-->

  Apple continuous-curvature superellipse for 1024×1024.
